<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>DENDEN TV - IPTV &amp; Cinéma Premium</title>
    
    <!-- Favicon & PWA Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    
    <!-- PWA Manifest & Meta Tags -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#00A8E1" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="DENDEN TV" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="msapplication-TileColor" content="#000000" />
    
    <!-- Android TV and Remote Control compatibility styling -->
    <style>
      /* Ensure scrollbars are styled elegantly or hidden for remote control environments */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: rgba(0, 0, 0, 0.3);
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(229, 9, 20, 0.4);
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(229, 9, 20, 0.8);
      }
      
      /* Reset default focusing ring box-shadows globally for TV environments to look premium */
      *:focus {
        outline: none;
      }
    </style>
    <script type="module" crossorigin src="/assets/index-BLTsDOkk.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-Bsv6LjYH.css">
  </head>
  <body class="bg-black select-none">
    <div id="root"></div>
    <script>
      // Register Progressive Web App Service Worker
      if ('serviceWorker' in navigator && window.location.protocol !== 'http:' || window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('Denden TV PWA Service Worker registered with scope: ', registration.scope);
            })
            .catch((err) => {
              console.error('Service Worker registration failed: ', err);
            });
        });
      }
    </script>
  </body>
</html>
