    <!-- Android TV and Remote Control compatibility styling -->
    <style>
      /* Ensure scrollbars are styled elegantly or hidden for remote control environments */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: rgba(0, 0, 0, 0.3);
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(229, 9, 20, 0.4);
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(229, 9, 20, 0.8);
      }
      
      /* Reset default focusing ring box-shadows globally for TV environments to look premium */
      *:focus {
        outline: none;
      }
    </style>
    <script type="module" crossorigin src="/assets/index-BEtPbfOV.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-C3FF9ifl.css">
  </head>
  <body class="bg-black select-none">
    <div id="root"></div>
    <script>
      window.addEventListener('error', function(e) {
        fetch('/api/log-error', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: e.message, source: e.filename, lineno: e.lineno, colno: e.colno, error: e.error ? e.error.stack : null })
        });
      });
      window.addEventListener('unhandledrejection', function(e) {
        fetch('/api/log-error', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: e.reason ? (e.reason.message || e.reason) : 'Unhandled Rejection', stack: e.reason ? e.reason.stack : null })
        });
      });
    </script>
    <script>
      // Clear out the old PWA caching service worker
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) {
            registration.unregister();
          }
        });
        
        // Register the new no-op sw.js to ensure immediate override
        if (window.location.protocol !== 'http:' || window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
          window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js')
              .then((registration) => {
                registration.update();
              });
          });
        }
      }
    </script>
  </body>
</html>
