<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>DENDEN TV - IPTV &amp; Cinéma Premium</title>
    
    <!-- Favicon & PWA Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="apple-mobile-web-app-image" content="/favicon.svg" />
    
    <!-- PWA Manifest & Meta Tags -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#00A8E1" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="DENDEN TV" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="msapplication-TileColor" content="#000000" />
    
    <!-- Android TV and Remote Control compatibility styling -->
    <style>
      /* Ensure scrollbars are styled elegantly or hidden for remote control environments */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: rgba(0, 0, 0, 0.3);
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(229, 9, 20, 0.4);
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(229, 9, 20, 0.8);
      }
      
      /* Reset default focusing ring box-shadows globally for TV environments to look premium */
      *:focus {
        outline: none;
      }
    </style>
  </head>
  <body class="bg-black select-none">
    <div id="root"></div>
    <script>
      // 1. Establish window.onerror handler to suppress browser/cross-origin/extension error reports
      window.onerror = function(message, source, lineno, colno, error) {
        var msg = message || '';
        var filename = source || '';
        var msgLower = msg.toLowerCase();
        
        // Suppress any generic Script errors, blank errors, extensions, or external hosts
        if (msgLower.indexOf('script error') !== -1 || !msg) {
          return true; // entirely handled, halts propagation
        }
        if (filename.indexOf('chrome-extension') !== -1 || filename.indexOf('moz-extension') !== -1 || filename.indexOf('safari-') !== -1 || filename.indexOf('extensions') !== -1) {
          return true;
        }
        if (!filename || filename === 'unknown') {
          return true;
        }
        if (filename.indexOf('http') === 0 && filename.indexOf(window.location.host) === -1) {
          return true;
        }
        
        // Log genuine errors if any through our endpoint
        var errorData = {
          message: msg,
          source: filename,
          lineno: lineno || 0,
          colno: colno || 0,
          error: error ? (error.stack || error.toString()) : null,
          type: 'window.onerror'
        };
        console.error("Captured Window Error:", errorData);
        fetch('/api/log-error', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(errorData)
        }).catch(function() {});
        
        return false; // let the default handler run if it wasn't filtered
      };

      // 2. Establish addEventListener('error') to double-ensure we call e.preventDefault(),
      // e.stopPropagation(), and e.stopImmediatePropagation()
      window.addEventListener('error', function(e) {
        var msg = e.message || '';
        var filename = e.filename || '';
        var msgLower = msg.toLowerCase();
        
        if (msgLower.indexOf('script error') !== -1 || !msg ||
            filename.indexOf('chrome-extension') !== -1 || filename.indexOf('moz-extension') !== -1 || filename.indexOf('safari-') !== -1 || filename.indexOf('extensions') !== -1 ||
            (!filename || filename === 'unknown') ||
            (filename.indexOf('http') === 0 && filename.indexOf(window.location.host) === -1)) {
          e.preventDefault();
          e.stopPropagation();
          e.stopImmediatePropagation();
          return;
        }
      }, true); // use capture phase so we capture it before anything else and can silence it

      // 3. Establish unhandledrejection event listener to catch and suppress promise rejections
      window.addEventListener('unhandledrejection', function(e) {
        var reason = e.reason || {};
        var msg = reason.message || reason.toString() || '';
        var msgLower = msg.toLowerCase();
        
        if (msgLower.indexOf('websocket') !== -1 || msgLower.indexOf('script error') !== -1 || msgLower.indexOf('resizeobserver') !== -1 || !msg) {
          e.preventDefault();
          e.stopPropagation();
          e.stopImmediatePropagation();
          return;
        }

        var stack = reason.stack || '';
        if (stack.indexOf('chrome-extension') !== -1 || stack.indexOf('moz-extension') !== -1) {
          e.preventDefault();
          e.stopPropagation();
          e.stopImmediatePropagation();
          return;
        }

        var errorData = {
          message: msg,
          stack: stack || null,
          type: 'unhandledrejection'
        };
        console.error("Unhandled Rejection Captured:", errorData);
        fetch('/api/log-error', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(errorData)
        }).catch(function() {});
      });
    </script>
    <script type="module" crossorigin src="/src/main.tsx"></script>
  </body>
</html>
