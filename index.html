      /* Ensure scrollbars are styled elegantly or hidden for remote control environments */
      ::-webkit-scrollbar {

  <body class="bg-black select-none">
    <div id="root"></div>
    <script>
      window.addEventListener('error', function(e) {
        fetch('/api/log-error', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: e.message, source: e.filename, lineno: e.lineno, colno: e.colno, error: e.error ? e.error.stack : null })
        });
      });
      window.addEventListener('unhandledrejection', function(e) {
        fetch('/api/log-error', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: e.reason ? (e.reason.message || e.reason) : 'Unhandled Rejection', stack: e.reason ? e.reason.stack : null })
        });
      });
    </script>
    <script>
      // Register the no-op sw.js to clear out any old caching PWA behavior
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then((registration) => {
            // Only update if it's not a fresh install, but honestly register() handles it.
            // We'll just log success or do nothing to stay safe.
            console.log('ServiceWorker registered');
          }).catch((error) => {
            console.warn('ServiceWorker registration failed:', error);
          });
        });
      }
    </script>
  </body>
