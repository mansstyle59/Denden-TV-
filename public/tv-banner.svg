<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1280" height="720" fill="#050505"/>
  
  <!-- Back Glows -->
  <circle cx="200" cy="720" r="400" fill="#00A8E1" fill-opacity="0.05" filter="url(#blur)"/>
  <circle cx="1080" cy="720" r="400" fill="#E50914" fill-opacity="0.05" filter="url(#blur)"/>

  <!-- Main Frame -->
  <rect x="240" y="180" width="800" height="360" rx="60" stroke="url(#neonGradient)" stroke-width="15" filter="url(#glow)"/>
  
  <!-- Stand Connector -->
  <rect x="610" y="540" width="60" height="40" fill="#00A8E1" fill-opacity="0.5"/>
  <rect x="500" y="580" width="280" height="15" rx="7.5" fill="#00A8E1" fill-opacity="0.8"/>

  <!-- Logo Group -->
  <g transform="translate(640, 360)">
    <!-- DENDEN -->
    <text y="-5" text-anchor="middle" fill="white" style="font-family: sans-serif; font-weight: 900; font-size: 140px; letter-spacing: -5px; text-transform: uppercase; font-style: italic;">DENDEN</text>
    
    <!-- TV SECTION -->
    <g transform="translate(0, 70)">
      <line x1="-180" y1="0" x2="-80" y2="0" stroke="#00A8E1" stroke-width="12" stroke-linecap="round"/>
      <text y="18" text-anchor="middle" fill="#00A8E1" style="font-family: sans-serif; font-weight: 900; font-size: 80px; letter-spacing: 5px;">TV</text>
      <line x1="80" y1="0" x2="180" y2="0" stroke="#00A8E1" stroke-width="12" stroke-linecap="round"/>
    </g>
  </g>

  <defs>
    <linearGradient id="neonGradient" x1="240" y1="180" x2="1040" y2="540" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00A8E1"/>
      <stop offset="0.5" stop-color="#00A8E1"/>
      <stop offset="0.51" stop-color="#E50914"/>
      <stop offset="1" stop-color="#E50914"/>
    </linearGradient>
    
    <filter id="glow" x="0" y="0" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    
    <filter id="blur">
      <feGaussianBlur stdDeviation="100"/>
    </filter>
  </defs>
</svg>
