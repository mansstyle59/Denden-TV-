<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" rx="120" fill="#050505"/>
  
  <!-- Outer Ambient Glows -->
  <circle cx="100" cy="412" r="200" fill="#00A8E1" fill-opacity="0.1" filter="url(#glowBlur)"/>
  <circle cx="412" cy="412" r="200" fill="#E50914" fill-opacity="0.1" filter="url(#glowBlur)"/>

  <!-- TV Frame with Neon Gradient -->
  <rect x="80" y="80" width="352" height="220" rx="45" stroke="url(#frameGrad)" stroke-width="12" filter="url(#neonGlow)"/>
  
  <!-- Stand -->
  <rect x="245" y="300" width="22" height="20" fill="#1A1A1A"/>
  <rect x="180" y="320" width="152" height="8" rx="4" fill="#1A1A1A"/>

  <!-- Play Button -->
  <path d="M225 145L305 190L225 235V145Z" fill="white" filter="url(#whiteGlow)"/>

  <!-- DENDEN Text (Metallic look) -->
  <text x="50%" y="420" text-anchor="middle" fill="url(#silverGrad)" style="font-family: sans-serif; font-weight: 900; font-size: 85px; letter-spacing: -4px; text-transform: uppercase; font-style: italic;">DENDEN</text>
  
  <!-- TV Section -->
  <g transform="translate(180, 440)">
    <line x1="0" y1="25" x2="40" y2="25" stroke="#00A8E1" stroke-width="6" stroke-linecap="round"/>
    <text x="75" y="45" text-anchor="middle" fill="#00A8E1" style="font-family: sans-serif; font-weight: 900; font-size: 55px; letter-spacing: 2px;">TV</text>
    <line x1="110" y1="25" x2="150" y2="25" stroke="#00A8E1" stroke-width="6" stroke-linecap="round"/>
  </g>

  <defs>
    <linearGradient id="frameGrad" x1="80" y1="80" x2="432" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00A8E1"/>
      <stop offset="0.5" stop-color="#00A8E1"/>
      <stop offset="0.51" stop-color="#E50914"/>
      <stop offset="1" stop-color="#E50914"/>
    </linearGradient>
    
    <linearGradient id="silverGrad" x1="0" y1="360" x2="0" y2="440" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.5" stop-color="#CCCCCC"/>
      <stop offset="1" stop-color="#999999"/>
    </linearGradient>

    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <filter id="whiteGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <filter id="glowBlur">
      <feGaussianBlur stdDeviation="50"/>
    </filter>
  </defs>
</svg>
