<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#0f172a"/>
      <stop offset="100%" stopColor="#020617"/>
    </linearGradient>
    <linearGradient id="glow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#0ea5e9"/>
      <stop offset="100%" stopColor="#3b82f6"/>
    </linearGradient>
    <linearGradient id="play-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#ffffff"/>
      <stop offset="100%" stopColor="#bae6fd"/>
    </linearGradient>
    <filter id="neon" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="25" result="blur1" />
      <feGaussianBlur stdDeviation="10" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>
  
  <g transform="translate(256, 256)">
    <g filter="url(#neon)">
      <!-- The outer loop (like a D and screen combined) -->
      <path d="M-80 -110 L 0 -110 C 90 -110 130 -50 130 0 C 130 50 90 110 0 110 L -80 110 Z" fill="none" stroke="url(#glow-grad)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <!-- Vertical bar of the D -->
    <rect x="-80" y="-110" width="32" height="220" rx="16" fill="url(#play-grad)"/>
    
    <!-- Play button inside -->
    <path d="M -10 -45 L 50 0 L -10 45 Z" fill="url(#play-grad)"/>
  </g>
</svg>
